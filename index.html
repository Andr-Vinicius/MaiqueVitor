<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Maique Vitor</title>
<link rel="icon" href="assets/Logo.png" type="image/png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Mrs+Saint+Delafield&family=Montserrat:wght@300;400;500&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Allura&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');

  @font-face {
            font-family: 'Abramo';
            src: url('assets/fontes/Abramo\ Script.woff2') format('woff2');
        }

  :root {
    --bg-base: #f2ede8; 
    --text-dark: #2a2a2a;
    --text-mid: #555555;
    /* Branco com mais transparência */
    --card-bg: rgba(255, 255, 255, 0.80); 
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--bg-base);
    background-image: 
      radial-gradient(circle at 10% 20%, rgba(210, 195, 180, 0.4) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(200, 185, 170, 0.3) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.2) 0%, transparent 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-end; /* Alinha ao fundo para o mobile ocupar a base */
    font-family: 'Montserrat', sans-serif;
    padding: 0;
    overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('https://www.transparenttextures.com/patterns/asfalt-light.png');
    opacity: 0.12;
    pointer-events: none;
    z-index: -1;
  }

  .container {
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-radius: 40px 40px 0 0; /* Arredondado só em cima para o mobile */
    padding: 90px 25px 50px;
    text-align: center;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.05);
    position: relative;
  }

  .avatar-container {
    position: absolute;
    top: -65px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
  }

  .avatar {
    background-color: #f2ede8;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  }

  .signature {
    font-family: 'Abramo', cursive;
    font-size: 5rem;
    color: var(--text-dark);
    line-height: 0.7;
    margin-top: 10px;
    font-weight: 400;
  }

  .tagline {
    font-size: 0.85rem;
    letter-spacing: 2.5px;
    color: var(--text-mid);
    margin-top: 30px; 
    margin-bottom: 45px;
    font-weight: 400;
  }

  .links-wrapper {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    align-items: center;
  }

  .link-card {
    background: transparent;
    border: 1px solid #333;
    border-radius: 35px;
    padding: 16px 15px;
    width: 90%; /* Largura dos botões interna */
    text-decoration: none;
    transition: all 0.3s ease;
  }

  .link-card:hover {
    background: rgba(255,255,255,0.4);
    transform: translateY(-2px);
  }

  .card-title {
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dark);
    font-weight: 500;
  }

  .footer {
    margin-top: 40px;
    font-size: 0.9rem;
    color: var(--text-dark);
    font-weight: 400;
    opacity: 0.8;
  }

  /* --- AJUSTE MOBILE --- */
  @media (max-width: 480px) {
    body {
      align-items: flex-end; /* Garante que o card "nasça" do rodapé */
    }
    .container {
      max-width: 100%; /* Ocupa toda a largura */
      border-radius: 40px 40px 0 0; /* Remove arredondamento lateral/inferior */
      padding-top: 80px;
    }
    .signature { font-size: 4.2rem; }
    .avatar { width: 115px; height: 115px; }
    .avatar-container { top: -58px; }
    .link-card { width: 100%; } /* Botões ocupam mais espaço no mobile */
  }

  /* Ajuste para Desktop (centralizado e com bordas arredondadas completas) */
  @media (min-width: 481px) {
    body { align-items: center; }
    .container {
      border-radius: 40px;
      margin: 60px 20px;
    }
  }
</style>
</head>
<body>

<div class="container">
  
  <div class="avatar-container">
    <img src="assets/ImagemDePerfil.jpeg" alt="Dr. Maique Vitor" class="avatar" onerror="this.src='https://via.placeholder.com/135?text=Foto'">
  </div>

  <div class="signature">Maique Vitor</div>
  <div class="tagline">Sejam Bem Vindos!</div>

  <div class="links-wrapper">
    <a href="https://www.instagram.com/dr.maiquevitor/" target="_blank"  class="link-card">
      <div class="card-title">WEBSITE</div>
    </a>
    <a href="https://wa.me/553599225613?text=Ol%C3%A1%2C%20tenho%20interesse%20em%20marcar%20uma%20consulta%21" target="_blank" class="link-card">
      <div class="card-title">CONSULTAS</div>
    </a>
    <a href="https://wa.me/595991205022?text=Ol%C3%A1%2C%20tenho%20interesse%20em%20fazer%20medicina%20no%20Paraguai%21" class="link-card" target="_blank">
      <div class="card-title">Assessoria – MED NO PARAGUAY</div>
    </a>
    <a href="https://www.instagram.com/ollimports/" target="_blank" class="link-card">
      <div class="card-title">OLLI – LOJA ONLINE</div>
    </a>
    <a href="https://www.instagram.com/dr.maiquevitor/" target="_blank" class="link-card">
      <div class="card-title">CONTACT ME</div>
    </a>
  </div>

  <div class="footer">
    @Dr. Maique Vitor
  </div>

</div>

</body>
</html>
